name: Update GitHub Stats

on:
  schedule:
    # Runs at 00:00 UTC every Sunday (Weekly)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch and Update Stats
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/update_stats.py

      - name: Fetch and Update Languages
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/update_langs.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update GitHub stats in README" && git push)
